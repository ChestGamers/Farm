<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИНТЕРАКТИВНАЯ КАРТА КЛЮЧЕЙ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="filters">
        <button class="filter-btn active" data-filter="all">Все <span class="count-badge" id="count-all">0</span></button>
        <button class="filter-btn" data-filter="loot">Для лута <span class="count-badge" id="count-loot">0</span></button>
        <button class="filter-btn" data-filter="quest">Квестовые <span class="count-badge" id="count-quest">0</span></button>
    </div>

    <div class="Map">
        <div class="map-wrapper" id="panzoom-element">
            <div class="map-farm">
                <svg viewBox="0 0 6640 3302">
                    <image class="key" 
                           data-type="loot" 
                           data-title="Ключ от офиса в амбаре" 
                           data-description="Ключ от офиса на втором этаже пункта торговли зерном в фермерских угодьях. там может хранится что-то ценное" 
                           data-photo="media/Key/Farm/ключ от офиса в амбаре.png" 
                           href="media/safe.png" 
                           x="1439.3177" y="2193.8039" 
                           width="50" height="50" />

                    <image class="key" 
                           data-type="loot" 
                           data-title="Ключ с кладбища" 
                           data-description="Ключ, который носят при себе комбатанты. Открывает дверь у кладбища на ферме. Там можно найти ценности, собранные комбатантами" 
                           data-photo="media/Key/Farm/ключ от кладбища.png" 
                           href="media/safe.png" 
                           x="1974.4235" y="2429.4588" 
                           width="50" height="50" />

                    <image class="key" 
                           data-type="loot" 
                           data-title="Ключ от главной гостевой комнаты в мотеле" 
                           data-description="Ключ от главной гостевой комнаты на втором этаже мотеля в фермерских угодьях. Здесь было много постояльцев, после которых остались ценные вещи" 
                           data-photo="media/Key/Farm/ключ от главной комнаты.png" 
                           href="media/safe.png" 
                           x="2706.1255" y="2151.4902" 
                           width="50" height="50" />

                    <image class="key" 
                           data-type="loot" 
                           data-title="Ключ от комнаты 201 в мотеле" 
                           data-description="Ключ от номера 201 во внешнем коридоре на втором этаже мотеля в фермерских угодьях" 
                           data-photo="media/Key/Farm/201 комната.png" 
                           href="media/safe.png" 
                           x="2905.9765" y="2110.4784" 
                           width="50" height="50" />

                    <image class="key" 
                           data-type="loot" 
                           data-title="Ключ от главной спальни мотеля" 
                           data-description="Ключ от главной спальни на втором этаже виллы в фермерских угодьях. Возможно, там хранится что-то очень ценное" 
                           data-photo="media/Key/Farm/ключ от главной спальни .png" 
                           href="media/safe.png" 
                           x="4294.9472" y="1868.6392" 
                           width="50" height="50" />

                    <image class="key" 
                           data-type="quest" 
                           data-title="Ключ от дома" 
                           data-description="Ключ от двери в доме, расположенном в северо-восточном углу фермерских угодий" 
                           data-photo="media/Key/Farm/ключ от дома на краю карты(квестовый).png" 
                           href="media/safe.png" 
                           x="4953.9608" y="1249.8824" 
                           width="50" height="50" />

                    <image class="key" 
                           data-type="loot" 
                           data-title="Ключ от зоны погрузки" 
                           data-description="Ключ от запертой комнаты в погрузочной зоне фермерских угодий, где хранится оружие" 
                           data-photo="media/Key/Farm/ключ от зоны погрузки.png" 
                           href="media/safe.png" 
                           x="4215.098" y="1232.3059" 
                           width="50" height="50" />

                    <image class="key" 
                           data-type="loot" 
                           data-title="Ключ от офиса переработки" 
                           data-description="Старый ключ от комнаты управления переработкой отходов под мостом в фермерских угодьях" 
                           data-photo="media/Key/Farm/ключ от офиса станции переработки.png" 
                           href="media/safe.png" 
                           x="2786.1961" y="1544.7765" 
                           width="50" height="50" />

                    <image class="key" 
                           data-type="quest" 
                           data-title="Ключ от склада у конюшни" 
                           data-description="Ключ от склада рядом с конюшней в фермерских угодьях" 
                           data-photo="media/Key/Farm/ключ от склада у конюшни(квестовый).png" 
                           href="media/safe.png" 
                           x="2370.2196" y="1282.4314" 
                           width="50" height="50" />
                </svg>
                <img src="media/Map/Карта фермы.jpg" alt="Карта Фермы">
            </div>
        </div>
    </div>

    <div class="info__bg">
        <div class="info">
            <button class="info__close">&times;</button>
            <img src="" alt="" class="info__photo">
            <h2 class="info_title"></h2>
            <p class="info__text"></p>
        </div>
    </div>
    
    <div class="tooltip"></div>

    <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
